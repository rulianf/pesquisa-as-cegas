<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Pesquisa às Cegas — Seus resultados</title>
    <link rel="icon" href="assets/svg/favicon.png" type="image/svg+xml" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS Files -->
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/screens.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/share.css" />
  </head>
  <body>


    <!-- HEADER -->
    <div class="quiz-header">
      <div style="display: flex; align-items: center; gap: var(--spacing-md); flex: 1;">
        <div class="quiz-logo-small">
          <img src="assets/svg/logo.png" alt="Logo Pesquisa às Cegas" />
        </div>
        <span class="quiz-header-title">Pesquisa às Cegas</span>
      </div>
    </div>

    <!-- TITLE SECTION + BOTÃO COMPARTILHAR -->
    <div class="result-title-section">
      <div class="result-title-inner">
        <h1 class="result-title">Seus resultados</h1>
        <p class="result-subtitle">Similaridade de ideias</p>

        <!-- Botão de compartilhar no Instagram — fica no topo, abaixo do título -->
        <button
          class="btn-share-instagram"
          id="share-main-btn"
          onclick="compartilharResultado()"
        >
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
          </svg>
          Compartilhar resultado
        </button>
      </div>
    </div>

    <!-- RESULTADOS -->
    <div class="result-container" id="result-container"></div>

    <!-- RODAPÉ -->
    <div class="result-footer">
      <div class="result-meta" id="result-meta"></div>
      <div class="modal-disclaimer">
        A similaridade reflete as respostas do questionário; não é endosso ou recomendação de voto.
      </div>
      <button class="btn-restart" onclick="voltarAoQuiz()">Refazer o questionário</button>
    </div>

    <!-- MODAL - CANDIDATE PROFILE -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
      <div class="modal-box" id="modal-box">
        <div class="modal-header">
          <div class="modal-avatar" id="modal-avatar"></div>
          <div>
            <div class="modal-name" id="modal-name"></div>
            <div class="modal-party" id="modal-party"></div>
          </div>
        </div>
        <p class="modal-bio" id="modal-bio"></p>
        <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">
          Fechar
        </button>
      </div>
    </div>

    <!-- JAVASCRIPT FILES -->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/scoring.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/resultado.js"></script>
    <script src="assets/js/share.js"></script>
  </body>
</html>
